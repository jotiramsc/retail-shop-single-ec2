server:
  port: ${PORT:8080}

spring:
  application:
    name: retail-shop-backend
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/retail_shop}
    username: ${DB_USERNAME:retail_user}
    password: ${DB_PASSWORD:retail_pass}
    driver-class-name: org.postgresql.Driver
  jackson:
    time-zone: Asia/Kolkata
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
    open-in-view: false
  sql:
    init:
      mode: ${DB_INIT_MODE:always}
  servlet:
    multipart:
      max-file-size: ${UPLOAD_MAX_FILE_SIZE:8MB}
      max-request-size: ${UPLOAD_MAX_REQUEST_SIZE:10MB}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  health:
    redis:
      enabled: ${APP_REDIS_ENABLED:false}

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173,http://localhost:5174,http://127.0.0.1:5174,http://localhost:5176,http://127.0.0.1:5176,http://localhost:15174,http://127.0.0.1:15174,http://localhost:15175,http://127.0.0.1:15175,http://localhost:15176,http://127.0.0.1:15176}
  low-stock-threshold: 5
  slow-moving-min-stock: 10
  slow-moving-max-units-sold: 3
  staff-auth:
    jwt-secret: ${STAFF_JWT_SECRET:local-dev-staff-secret-change-me}
    jwt-ttl-minutes: ${STAFF_JWT_TTL_MINUTES:480}
  aws:
    region: ${AWS_REGION:us-east-1}
    s3-bucket: ${AWS_S3_BUCKET:}
    cloudfront-domain: ${AWS_CLOUDFRONT_DOMAIN:}
    upload-max-bytes: ${UPLOAD_MAX_BYTES:5242880}
    access-key-id: ${AWS_ACCESS_KEY_ID:}
    secret-access-key: ${AWS_SECRET_ACCESS_KEY:}
    migrate-images-on-start: ${MIGRATE_IMAGES_TO_S3_ON_START:false}
  customer-auth:
    jwt-secret: ${CUSTOMER_JWT_SECRET:local-dev-customer-secret-change-me}
    jwt-ttl-minutes: ${CUSTOMER_JWT_TTL_MINUTES:43200}
    otp-ttl-minutes: ${OTP_TTL_MINUTES:5}
    otp-rate-limit-seconds: ${OTP_RATE_LIMIT_SECONDS:30}
    otp-length: ${OTP_LENGTH:6}
    otp-max-attempts: ${OTP_MAX_ATTEMPTS:5}
  msg91:
    auth-key: ${MSG91_AUTH_KEY:}
    template-id: ${MSG91_TEMPLATE_ID:}
    otp-length: ${MSG91_OTP_LENGTH:6}
  pricing:
    tax-percent: ${CHECKOUT_TAX_PERCENT:0}
    delivery-charge: ${CHECKOUT_DELIVERY_CHARGE:0}
    free-delivery-min-order: ${CHECKOUT_FREE_DELIVERY_MIN_ORDER:0}
  redis:
    enabled: ${APP_REDIS_ENABLED:false}
    otp-key-prefix: ${APP_REDIS_OTP_KEY_PREFIX:retail:otp:}
    cart-key-prefix: ${APP_REDIS_CART_KEY_PREFIX:retail:cart:}
    cart-ttl-minutes: ${APP_REDIS_CART_TTL_MINUTES:30}
  payment:
    provider: ${PAYMENT_PROVIDER:RAZORPAY}
  razorpay:
    key-id: ${RAZORPAY_KEY_ID:rzp_test_SirLkQHBMbkN2d}
    key-secret: ${RAZORPAY_KEY_SECRET:}
    webhook-secret: ${RAZORPAY_WEBHOOK_SECRET:}
  whatsapp-provider: ${WHATSAPP_PROVIDER:META}
  gupshup:
    api-key: ${GUPSHUP_API_KEY:}
    app-name: ${GUPSHUP_APP_NAME:}
    source-number: ${GUPSHUP_SOURCE_NUMBER:}
    message-endpoint: ${GUPSHUP_MESSAGE_ENDPOINT:https://api.gupshup.io/wa/api/v1/msg}
    template-endpoint: ${GUPSHUP_TEMPLATE_ENDPOINT:https://api.gupshup.io/wa/api/v1/template/msg}
    max-attempts: ${GUPSHUP_MAX_ATTEMPTS:3}
    retry-delay-ms: ${GUPSHUP_RETRY_DELAY_MS:750}
    templates:
      otp: ${GUPSHUP_OTP_TEMPLATE_ID:}
      order-confirmation: ${GUPSHUP_ORDER_CONFIRMATION_TEMPLATE_ID:}
      order-dispatched: ${GUPSHUP_ORDER_DISPATCHED_TEMPLATE_ID:}
      order-delivered: ${GUPSHUP_ORDER_DELIVERED_TEMPLATE_ID:}
      order-cancelled: ${GUPSHUP_ORDER_CANCELLED_TEMPLATE_ID:}
      order-returned: ${GUPSHUP_ORDER_RETURNED_TEMPLATE_ID:}
      refund-initiated: ${GUPSHUP_REFUND_INITIATED_TEMPLATE_ID:}
      payment-failed: ${GUPSHUP_PAYMENT_FAILED_TEMPLATE_ID:}
      payment-success: ${GUPSHUP_PAYMENT_SUCCESS_TEMPLATE_ID:}
      bot-welcome: ${GUPSHUP_BOT_WELCOME_TEMPLATE_ID:}
      bot-menu: ${GUPSHUP_BOT_MENU_TEMPLATE_ID:}
      support-escalation: ${GUPSHUP_SUPPORT_ESCALATION_TEMPLATE_ID:}
      out-of-office: ${GUPSHUP_OUT_OF_OFFICE_TEMPLATE_ID:}
      feedback-request: ${GUPSHUP_FEEDBACK_REQUEST_TEMPLATE_ID:}
  meta:
    access-token: ${META_ACCESS_TOKEN:}
    page-id: ${FB_PAGE_ID:${MARKETING_FACEBOOK_PAGE_ID:}}
    page-access-token: ${FB_PAGE_ACCESS_TOKEN:${MARKETING_FACEBOOK_PAGE_ACCESS_TOKEN:}}
    instagram-business-account-id: ${IG_BUSINESS_ACCOUNT_ID:}
    graph-version: ${META_GRAPH_VERSION:v23.0}
    whatsapp-phone-number-id: ${META_WHATSAPP_PHONE_NUMBER_ID:${MARKETING_WHATSAPP_PHONE_NUMBER_ID:}}
    whatsapp-otp-template-name: ${META_WHATSAPP_OTP_TEMPLATE_NAME:}
    whatsapp-otp-template-language: ${META_WHATSAPP_OTP_TEMPLATE_LANGUAGE:en_US}
    whatsapp-max-attempts: ${META_WHATSAPP_MAX_ATTEMPTS:3}
    whatsapp-retry-delay-ms: ${META_WHATSAPP_RETRY_DELAY_MS:750}
    whatsapp-templates:
      default-language: ${META_WHATSAPP_DEFAULT_TEMPLATE_LANGUAGE:en_US}
      order-confirmation:
        name: ${META_WHATSAPP_ORDER_CONFIRMATION_TEMPLATE_NAME:kp_order_confirmed_en}
        language: ${META_WHATSAPP_ORDER_CONFIRMATION_TEMPLATE_LANGUAGE:en_US}
      order-dispatched:
        name: ${META_WHATSAPP_ORDER_DISPATCHED_TEMPLATE_NAME:kp_order_dispatched_en}
        language: ${META_WHATSAPP_ORDER_DISPATCHED_TEMPLATE_LANGUAGE:en_US}
      order-delivered:
        name: ${META_WHATSAPP_ORDER_DELIVERED_TEMPLATE_NAME:kp_order_delivered_en}
        language: ${META_WHATSAPP_ORDER_DELIVERED_TEMPLATE_LANGUAGE:en_US}
      order-cancelled:
        name: ${META_WHATSAPP_ORDER_CANCELLED_TEMPLATE_NAME:kp_order_cancelled_en}
        language: ${META_WHATSAPP_ORDER_CANCELLED_TEMPLATE_LANGUAGE:en_US}
      order-returned:
        name: ${META_WHATSAPP_ORDER_RETURNED_TEMPLATE_NAME:kp_order_returned_en}
        language: ${META_WHATSAPP_ORDER_RETURNED_TEMPLATE_LANGUAGE:en_US}
      refund-initiated:
        name: ${META_WHATSAPP_REFUND_INITIATED_TEMPLATE_NAME:kp_refund_initiated_en}
        language: ${META_WHATSAPP_REFUND_INITIATED_TEMPLATE_LANGUAGE:en_US}
      payment-failed:
        name: ${META_WHATSAPP_PAYMENT_FAILED_TEMPLATE_NAME:kp_payment_failed_en}
        language: ${META_WHATSAPP_PAYMENT_FAILED_TEMPLATE_LANGUAGE:en_US}
      payment-success:
        name: ${META_WHATSAPP_PAYMENT_SUCCESS_TEMPLATE_NAME:kp_payment_success_en}
        language: ${META_WHATSAPP_PAYMENT_SUCCESS_TEMPLATE_LANGUAGE:en_US}
      bot-welcome:
        name: ${META_WHATSAPP_BOT_WELCOME_TEMPLATE_NAME:kp_bot_welcome_en}
        language: ${META_WHATSAPP_BOT_WELCOME_TEMPLATE_LANGUAGE:en_US}
      bot-menu:
        name: ${META_WHATSAPP_BOT_MENU_TEMPLATE_NAME:kp_bot_menu_en}
        language: ${META_WHATSAPP_BOT_MENU_TEMPLATE_LANGUAGE:en_US}
      support-escalation:
        name: ${META_WHATSAPP_SUPPORT_ESCALATION_TEMPLATE_NAME:kp_support_escalation_en}
        language: ${META_WHATSAPP_SUPPORT_ESCALATION_TEMPLATE_LANGUAGE:en_US}
      out-of-office:
        name: ${META_WHATSAPP_OUT_OF_OFFICE_TEMPLATE_NAME:kp_out_of_office_en}
        language: ${META_WHATSAPP_OUT_OF_OFFICE_TEMPLATE_LANGUAGE:en_US}
      feedback-request:
        name: ${META_WHATSAPP_FEEDBACK_REQUEST_TEMPLATE_NAME:kp_feedback_request_en}
        language: ${META_WHATSAPP_FEEDBACK_REQUEST_TEMPLATE_LANGUAGE:en_US}
    app-id: ${META_APP_ID:${FB_APP_ID:}}
    app-secret: ${META_APP_SECRET:${FB_APP_SECRET:}}
    exchange-token: ${META_FB_EXCHANGE_TOKEN:${FB_EXCHANGE_TOKEN:}}
    token-refresh-secret-id: ${META_TOKEN_REFRESH_SECRET_ID:${APP_CONFIG_SECRET_ID:}}
    token-refresh-enabled: ${META_TOKEN_REFRESH_ENABLED:true}
    token-refresh-interval-ms: ${META_TOKEN_REFRESH_INTERVAL_MS:3888000000}
    token-refresh-initial-delay-ms: ${META_TOKEN_REFRESH_INITIAL_DELAY_MS:60000}
  google-maps:
    api-key: ${GOOGLE_MAPS_API_KEY:}
  google-auth:
    client-id: ${GOOGLE_CLIENT_ID:647290985970-rhhho15u57fp07jrj75him17gfvjnhc4.apps.googleusercontent.com}
    client-secret: ${GOOGLE_CLIENT_SECRET:${GOOGLE_OAUTH_CLIENT_SECRET:}}
    redirect-uri: ${GOOGLE_REDIRECT_URI:${GOOGLE_OAUTH_REDIRECT_URI:}}

marketing:
  ai:
    enabled: ${MARKETING_AI_ENABLED:true}
    api-key: ${OPEN_AI_API_KEY:${MARKETING_OPENAI_API_KEY:}}
    model: ${MARKETING_OPENAI_MODEL:gpt-4.1-mini}
    image-model: ${MARKETING_OPENAI_IMAGE_MODEL:gpt-image-1.5}
    image-size: ${MARKETING_OPENAI_IMAGE_SIZE:1024x1024}
    image-quality: ${MARKETING_OPENAI_IMAGE_QUALITY:medium}
  meta:
    access-token: ${MARKETING_META_ACCESS_TOKEN:${META_ACCESS_TOKEN:}}
    instagram-business-account-id: ${MARKETING_INSTAGRAM_BUSINESS_ACCOUNT_ID:${IG_BUSINESS_ACCOUNT_ID:}}
    facebook-page-id: ${MARKETING_FACEBOOK_PAGE_ID:${FB_PAGE_ID:}}
    graph-version: ${MARKETING_META_GRAPH_VERSION:${META_GRAPH_VERSION:v23.0}}
  whatsapp:
    phone-number-id: ${MARKETING_WHATSAPP_PHONE_NUMBER_ID:${META_WHATSAPP_PHONE_NUMBER_ID:}}

bot:
  enabled: ${BOT_ENABLED:true}
  openai-enabled: ${BOT_OPENAI_ENABLED:true}
  memory-enabled: ${BOT_MEMORY_ENABLED:true}
  memory-top-k: ${BOT_MEMORY_TOP_K:5}
  conversation-summary-enabled: ${BOT_CONVERSATION_SUMMARY_ENABLED:true}
  openai:
    api-key: ${BOT_OPENAI_API_KEY:${OPEN_AI_API_KEY:${MARKETING_OPENAI_API_KEY:}}}
    model: ${BOT_OPENAI_MODEL:${MARKETING_OPENAI_MODEL:gpt-4.1-mini}}
    embedding-model: ${BOT_EMBEDDING_MODEL:text-embedding-3-small}
    embedding-dimensions: ${BOT_EMBEDDING_DIMENSIONS:1536}
  qdrant:
    host: ${QDRANT_HOST:localhost}
    port: ${QDRANT_PORT:6333}
    api-key: ${QDRANT_API_KEY:}
    collection-customer-memory: ${QDRANT_COLLECTION_CUSTOMER_MEMORY:krishnai_customer_memory}
    use-tls: ${QDRANT_USE_TLS:false}
    timeout-seconds: ${QDRANT_TIMEOUT_SECONDS:8}

omnichannel:
  website-base-url: ${OMNICHANNEL_WEBSITE_BASE_URL:https://kpskrishnai.com}
  webhook-verify-token: ${OMNICHANNEL_WEBHOOK_VERIFY_TOKEN:}
  webhook-secret: ${OMNICHANNEL_WEBHOOK_SECRET:}
  default-coupon-code: ${OMNICHANNEL_DEFAULT_COUPON_CODE:}
  max-product-cards: ${OMNICHANNEL_MAX_PRODUCT_CARDS:6}
