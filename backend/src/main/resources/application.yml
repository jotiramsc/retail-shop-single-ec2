server:
  port: ${PORT:8080}

spring:
  application:
    name: retail-shop-backend
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/retail_shop}
    username: ${DB_USERNAME:retail_user}
    password: ${DB_PASSWORD:retail_pass}
    driver-class-name: org.postgresql.Driver
  jackson:
    time-zone: Asia/Kolkata
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        format_sql: true
    open-in-view: false
  sql:
    init:
      mode: ${DB_INIT_MODE:always}
  servlet:
    multipart:
      max-file-size: ${UPLOAD_MAX_FILE_SIZE:8MB}
      max-request-size: ${UPLOAD_MAX_REQUEST_SIZE:10MB}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  health:
    redis:
      enabled: ${APP_REDIS_ENABLED:false}

app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173,http://localhost:5174,http://127.0.0.1:5174,http://localhost:5176,http://127.0.0.1:5176,http://localhost:15174,http://127.0.0.1:15174,http://localhost:15175,http://127.0.0.1:15175,http://localhost:15176,http://127.0.0.1:15176}
  low-stock-threshold: 5
  slow-moving-min-stock: 10
  slow-moving-max-units-sold: 3
  staff-auth:
    jwt-secret: ${STAFF_JWT_SECRET:local-dev-staff-secret-change-me}
    jwt-ttl-minutes: ${STAFF_JWT_TTL_MINUTES:480}
  aws:
    region: ${AWS_REGION:us-east-1}
    s3-bucket: ${AWS_S3_BUCKET:}
    cloudfront-domain: ${AWS_CLOUDFRONT_DOMAIN:}
    upload-max-bytes: ${UPLOAD_MAX_BYTES:5242880}
    access-key-id: ${AWS_ACCESS_KEY_ID:}
    secret-access-key: ${AWS_SECRET_ACCESS_KEY:}
    migrate-images-on-start: ${MIGRATE_IMAGES_TO_S3_ON_START:false}
  customer-auth:
    jwt-secret: ${CUSTOMER_JWT_SECRET:local-dev-customer-secret-change-me}
    jwt-ttl-minutes: ${CUSTOMER_JWT_TTL_MINUTES:43200}
    otp-ttl-minutes: ${OTP_TTL_MINUTES:5}
    otp-rate-limit-seconds: ${OTP_RATE_LIMIT_SECONDS:30}
    otp-length: ${OTP_LENGTH:6}
    otp-max-attempts: ${OTP_MAX_ATTEMPTS:5}
  msg91:
    auth-key: ${MSG91_AUTH_KEY:}
    template-id: ${MSG91_TEMPLATE_ID:}
    otp-length: ${MSG91_OTP_LENGTH:6}
  pricing:
    tax-percent: ${CHECKOUT_TAX_PERCENT:0}
    delivery-charge: ${CHECKOUT_DELIVERY_CHARGE:0}
    free-delivery-min-order: ${CHECKOUT_FREE_DELIVERY_MIN_ORDER:0}
  redis:
    enabled: ${APP_REDIS_ENABLED:false}
    otp-key-prefix: ${APP_REDIS_OTP_KEY_PREFIX:retail:otp:}
    cart-key-prefix: ${APP_REDIS_CART_KEY_PREFIX:retail:cart:}
    cart-ttl-minutes: ${APP_REDIS_CART_TTL_MINUTES:30}
  razorpay:
    key-id: ${RAZORPAY_KEY_ID:}
    key-secret: ${RAZORPAY_KEY_SECRET:}
    webhook-secret: ${RAZORPAY_WEBHOOK_SECRET:}
  phonepe:
    client-id: ${PHONEPE_CLIENT_ID:}
    client-secret: ${PHONEPE_CLIENT_SECRET:}
    client-version: ${PHONEPE_CLIENT_VERSION:1}
    env: ${PHONEPE_ENV:sandbox}
    redirect-url: ${PHONEPE_REDIRECT_URL:http://localhost:5176/checkout}
    webhook-url: ${PHONEPE_WEBHOOK_URL:}
  twilio:
    account-sid: ${TWILIO_ACCOUNT_SID:}
    auth-token: ${TWILIO_AUTH_TOKEN:}
    verify-service-sid: ${TWILIO_VERIFY_SERVICE_SID:}
    verify-friendly-name: ${TWILIO_VERIFY_FRIENDLY_NAME:Retail Shop OTP}
    channel: ${TWILIO_VERIFY_CHANNEL:whatsapp}
    whatsapp-from: ${TWILIO_WHATSAPP_FROM:}
    otp-content-sid: ${TWILIO_WHATSAPP_OTP_CONTENT_SID:}
    order-update-content-sid: ${TWILIO_WHATSAPP_ORDER_CONTENT_SID:}
    offer-content-sid: ${TWILIO_WHATSAPP_OFFER_CONTENT_SID:}
  gupshup:
    api-key: ${GUPSHUP_API_KEY:}
    app-name: ${GUPSHUP_APP_NAME:}
    source-number: ${GUPSHUP_SOURCE_NUMBER:}
    otp-template-id: ${GUPSHUP_OTP_TEMPLATE_ID:}
  meta:
    access-token: ${META_ACCESS_TOKEN:}
    page-id: ${FB_PAGE_ID:}
    instagram-business-account-id: ${IG_BUSINESS_ACCOUNT_ID:}
    graph-version: ${META_GRAPH_VERSION:v23.0}
  google-maps:
    api-key: ${GOOGLE_MAPS_API_KEY:}

marketing:
  ai:
    enabled: ${MARKETING_AI_ENABLED:true}
    api-key: ${MARKETING_OPENAI_API_KEY:}
    model: ${MARKETING_OPENAI_MODEL:gpt-4.1-mini}
    image-provider: ${MARKETING_IMAGE_PROVIDER:OPENAI}
    image-model: ${MARKETING_OPENAI_IMAGE_MODEL:gpt-image-1.5}
    image-size: ${MARKETING_OPENAI_IMAGE_SIZE:1024x1024}
    image-quality: ${MARKETING_OPENAI_IMAGE_QUALITY:medium}
  leonardo:
    api-key: ${MARKETING_LEONARDO_API_KEY:}
    model-id: ${MARKETING_LEONARDO_MODEL_ID:de7d3faf-762f-48e0-b3b7-9d0ac3a3fcf3}
    style-uuid: ${MARKETING_LEONARDO_STYLE_UUID:111dc692-d470-4eec-b791-3475abac4c46}
    alchemy: ${MARKETING_LEONARDO_ALCHEMY:true}
    enhance-prompt: ${MARKETING_LEONARDO_ENHANCE_PROMPT:false}
    public-images: ${MARKETING_LEONARDO_PUBLIC_IMAGES:true}
    width: ${MARKETING_LEONARDO_WIDTH:1024}
    height: ${MARKETING_LEONARDO_HEIGHT:1024}
    contrast: ${MARKETING_LEONARDO_CONTRAST:3.5}
    poll-attempts: ${MARKETING_LEONARDO_POLL_ATTEMPTS:16}
    poll-delay-ms: ${MARKETING_LEONARDO_POLL_DELAY_MS:1500}
  meta:
    access-token: ${MARKETING_META_ACCESS_TOKEN:${META_ACCESS_TOKEN:}}
    instagram-business-account-id: ${MARKETING_INSTAGRAM_BUSINESS_ACCOUNT_ID:${IG_BUSINESS_ACCOUNT_ID:}}
    facebook-page-id: ${MARKETING_FACEBOOK_PAGE_ID:${FB_PAGE_ID:}}
    graph-version: ${MARKETING_META_GRAPH_VERSION:${META_GRAPH_VERSION:v23.0}}
  whatsapp:
    provider: ${MARKETING_WHATSAPP_PROVIDER:GUPSHUP}
    phone-number-id: ${MARKETING_WHATSAPP_PHONE_NUMBER_ID:}
  twilio:
    account-sid: ${MARKETING_TWILIO_ACCOUNT_SID:${TWILIO_ACCOUNT_SID:}}
    auth-token: ${MARKETING_TWILIO_AUTH_TOKEN:${TWILIO_AUTH_TOKEN:}}
    whatsapp-from: ${MARKETING_TWILIO_WHATSAPP_FROM:${TWILIO_WHATSAPP_FROM:}}
    offer-content-sid: ${MARKETING_TWILIO_OFFER_CONTENT_SID:${TWILIO_WHATSAPP_OFFER_CONTENT_SID:}}
  gupshup:
    api-key: ${MARKETING_GUPSHUP_API_KEY:${GUPSHUP_API_KEY:}}
    app-name: ${MARKETING_GUPSHUP_APP_NAME:${GUPSHUP_APP_NAME:}}
    source-number: ${MARKETING_GUPSHUP_SOURCE_NUMBER:${GUPSHUP_SOURCE_NUMBER:}}
    template-id: ${MARKETING_GUPSHUP_TEMPLATE_ID:${GUPSHUP_OTP_TEMPLATE_ID:}}

omnichannel:
  website-base-url: ${OMNICHANNEL_WEBSITE_BASE_URL:https://kpskrishnai.com}
  webhook-verify-token: ${OMNICHANNEL_WEBHOOK_VERIFY_TOKEN:}
  webhook-secret: ${OMNICHANNEL_WEBHOOK_SECRET:}
  default-coupon-code: ${OMNICHANNEL_DEFAULT_COUPON_CODE:}
  max-product-cards: ${OMNICHANNEL_MAX_PRODUCT_CARDS:6}
