spring:
  datasource:
    url: jdbc:h2:file:${LOCAL_DB_PATH:./.local-db/retail_shop};MODE=PostgreSQL;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: update
  sql:
    init:
      mode: never
  h2:
    console:
      enabled: true
      path: /h2-console

management:
  endpoint:
    health:
      show-details: always
