AWSTemplateFormatVersion: '2010-09-09'
Description: Single-EC2 retail shop stack with persistent EBS-backed Postgres, Secrets Manager, S3 artifacts, and GitHub OIDC deploy role.

Parameters:
  ProjectName:
    Type: String
    Default: retail-shop
    AllowedPattern: '[a-zA-Z0-9-]+'
  EnvironmentName:
    Type: String
    Default: prod
    AllowedPattern: '[a-zA-Z0-9-]+'
  AmiId:
    Type: AWS::SSM::Parameter::Value<AWS::EC2::Image::Id>
    Default: /aws/service/ami-amazon-linux-latest/al2023-ami-kernel-default-arm64
  InstanceType:
    Type: String
    Default: t4g.medium
  KeyPairName:
    Type: String
    Default: ''
  PublicAccessCidr:
    Type: String
    Default: 0.0.0.0/0
  SshAccessCidr:
    Type: String
    Default: ''
  VpcCidr:
    Type: String
    Default: 10.42.0.0/16
  PublicSubnetCidr:
    Type: String
    Default: 10.42.1.0/24
  SecondPublicSubnetCidr:
    Type: String
    Default: 10.42.2.0/24
  RootVolumeSize:
    Type: Number
    Default: 20
    MinValue: 16
  DataVolumeSize:
    Type: Number
    Default: 40
    MinValue: 20
  PostgresDatabaseName:
    Type: String
    Default: retail_shop
  PostgresDatabaseUser:
    Type: String
    Default: retail_user
  GitHubOwner:
    Type: String
    Default: ''
  GitHubRepo:
    Type: String
    Default: ''
  GitHubBranch:
    Type: String
    Default: main
  ExistingGitHubOidcProviderArn:
    Type: String
    Default: ''
  GitHubOidcThumbprint:
    Type: String
    Default: 6938fd4d98bab03faadb97b34396831e3780aea1
  CorsAllowedOrigins:
    Type: String
  StaffJwtSecret:
    Type: String
    NoEcho: true
  CustomerJwtSecret:
    Type: String
    NoEcho: true
  CheckoutTaxPercent:
    Type: String
    Default: '0'
  CheckoutDeliveryCharge:
    Type: String
    Default: '0'
  CheckoutFreeDeliveryMinOrder:
    Type: String
    Default: '0'
  PaymentProvider:
    Type: String
    Default: RAZORPAY
    AllowedValues:
      - RAZORPAY
  RazorpayKeyId:
    Type: String
    Default: rzp_test_SirLkQHBMbkN2d
  RazorpayKeySecret:
    Type: String
    Default: ''
    NoEcho: true
  RazorpayWebhookSecret:
    Type: String
    Default: ''
    NoEcho: true
  MetaAccessToken:
    Type: String
    Default: ''
    NoEcho: true
  MetaWhatsAppPhoneNumberId:
    Type: String
    Default: ''
  MetaWhatsAppOtpTemplateName:
    Type: String
    Default: ''
  MetaWhatsAppOtpTemplateLanguage:
    Type: String
    Default: en_US
  FacebookPageId:
    Type: String
    Default: ''
  InstagramBusinessAccountId:
    Type: String
    Default: ''
  MetaGraphVersion:
    Type: String
    Default: v23.0
  FacebookPageAccessToken:
    Type: String
    Default: ''
    NoEcho: true
  MetaAppId:
    Type: String
    Default: ''
  MetaAppSecret:
    Type: String
    Default: ''
    NoEcho: true
  MetaFbExchangeToken:
    Type: String
    Default: ''
    NoEcho: true
  OpenAiApiKey:
    Type: String
    Default: ''
    NoEcho: true
  GoogleClientId:
    Type: String
    Default: 647290985970-rhhho15u57fp07jrj75him17gfvjnhc4.apps.googleusercontent.com
  GoogleClientSecret:
    Type: String
    Default: ''
    NoEcho: true
  GoogleOAuthRedirectUri:
    Type: String
    Default: ''
  GoogleMapsApiKey:
    Type: String
    Default: ''
    NoEcho: true
  AwsS3Bucket:
    Type: String
    Default: ''
  AwsCloudFrontDomain:
    Type: String
    Default: ''
  CreateRoute53HostedZone:
    Type: String
    Default: 'false'
    AllowedValues:
      - 'true'
      - 'false'
  DomainName:
    Type: String
    Default: ''
    Description: Optional apex domain name, for example kpskrishnai.com. When CreateRoute53HostedZone is true, the stack creates an A record for this domain and www.
  EnableHttps:
    Type: String
    Default: 'true'
    AllowedValues:
      - 'true'
      - 'false'
    Description: Create a DNS-validated ACM certificate and HTTPS listener when Route53 hosted zone is managed by this stack.

Conditions:
  HasKeyPair: !Not [!Equals [!Ref KeyPairName, '']]
  HasSshAccess: !Not [!Equals [!Ref SshAccessCidr, '']]
  HasGitHubOwner: !Not [!Equals [!Ref GitHubOwner, '']]
  HasGitHubRepo: !Not [!Equals [!Ref GitHubRepo, '']]
  HasDomainName: !Not [!Equals [!Ref DomainName, '']]
  HasAwsS3Bucket: !Not [!Equals [!Ref AwsS3Bucket, '']]
  HasAwsCloudFrontDomain: !Not [!Equals [!Ref AwsCloudFrontDomain, '']]
  CreateMediaBucket: !Not [!Condition HasAwsS3Bucket]
  ShouldCreateHostedZone: !And
    - !Equals [!Ref CreateRoute53HostedZone, 'true']
    - !Condition HasDomainName
  ShouldEnableHttps: !And
    - !Equals [!Ref EnableHttps, 'true']
    - !Condition ShouldCreateHostedZone
  EnableGitHubDeploy: !And
    - !Condition HasGitHubOwner
    - !Condition HasGitHubRepo
  HasExistingGitHubOidcProvider: !And
    - !Condition EnableGitHubDeploy
    - !Not [!Equals [!Ref ExistingGitHubOidcProviderArn, '']]
  CreateGitHubOidcProvider: !And
    - !Condition EnableGitHubDeploy
    - !Equals [!Ref ExistingGitHubOidcProviderArn, '']

Resources:
  RetailVpc:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: !Ref VpcCidr
      EnableDnsHostnames: true
      EnableDnsSupport: true
      Tags:
        - Key: Name
          Value: !Sub ${ProjectName}-${EnvironmentName}-vpc

  InternetGateway:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: !Sub ${ProjectName}-${EnvironmentName}-igw

  VpcGatewayAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref RetailVpc
      InternetGatewayId: !Ref InternetGateway

  PublicSubnet:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref RetailVpc
      CidrBlock: !Ref PublicSubnetCidr
      AvailabilityZone: !Select [0, !GetAZs '']
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: !Sub ${ProjectName}-${EnvironmentName}-public-subnet

  SecondPublicSubnet:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref RetailVpc
      CidrBlock: !Ref SecondPublicSubnetCidr
      AvailabilityZone: !Select [1, !GetAZs '']
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: !Sub ${ProjectName}-${EnvironmentName}-public-subnet-2

  PublicRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref RetailVpc
      Tags:
        - Key: Name
          Value: !Sub ${ProjectName}-${EnvironmentName}-public-rt

  DefaultPublicRoute:
    Type: AWS::EC2::Route
    DependsOn: VpcGatewayAttachment
    Properties:
      RouteTableId: !Ref PublicRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway

  PublicSubnetRouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      RouteTableId: !Ref PublicRouteTable
      SubnetId: !Ref PublicSubnet

  SecondPublicSubnetRouteTableAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      RouteTableId: !Ref PublicRouteTable
      SubnetId: !Ref SecondPublicSubnet

  LoadBalancerSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Public HTTP access for the retail shop ALB
      VpcId: !Ref RetailVpc
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: !Ref PublicAccessCidr
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: !Ref PublicAccessCidr
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0
      Tags:
        - Key: Name
          Value: !Sub ${ProjectName}-${EnvironmentName}-alb-sg

  AppSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Public web access for the retail single-host app
      GroupName: !Sub ${ProjectName}-${EnvironmentName}-sg
      VpcId: !Ref RetailVpc
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: !Ref PublicAccessCidr
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: !Ref PublicAccessCidr
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0
      Tags:
        - Key: Name
          Value: !Sub ${ProjectName}-${EnvironmentName}-sg

  AppSecurityGroupSshIngress:
    Type: AWS::EC2::SecurityGroupIngress
    Condition: HasSshAccess
    Properties:
      GroupId: !Ref AppSecurityGroup
      IpProtocol: tcp
      FromPort: 22
      ToPort: 22
      CidrIp: !Ref SshAccessCidr

  PublicLoadBalancer:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    Properties:
      Name: !Sub ${ProjectName}-${EnvironmentName}-alb
      Scheme: internet-facing
      Type: application
      SecurityGroups:
        - !Ref LoadBalancerSecurityGroup
      Subnets:
        - !Ref PublicSubnet
        - !Ref SecondPublicSubnet
      Tags:
        - Key: Name
          Value: !Sub ${ProjectName}-${EnvironmentName}-alb

  LoadBalancerTargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Name: !Sub ${ProjectName}-${EnvironmentName}-tg
      Port: 80
      Protocol: HTTP
      TargetType: instance
      VpcId: !Ref RetailVpc
      HealthCheckEnabled: true
      HealthCheckPath: /actuator/health
      HealthCheckProtocol: HTTP
      Matcher:
        HttpCode: 200
      Targets:
        - Id: !Ref RetailEc2Instance
          Port: 80

  LoadBalancerListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      DefaultActions: !If
        - ShouldEnableHttps
        - - Type: redirect
            RedirectConfig:
              Protocol: HTTPS
              Port: '443'
              StatusCode: HTTP_301
        - - Type: forward
            TargetGroupArn: !Ref LoadBalancerTargetGroup
      LoadBalancerArn: !Ref PublicLoadBalancer
      Port: 80
      Protocol: HTTP

  SslCertificate:
    Type: AWS::CertificateManager::Certificate
    Condition: ShouldEnableHttps
    Properties:
      DomainName: !Ref DomainName
      SubjectAlternativeNames:
        - !Sub www.${DomainName}
      ValidationMethod: DNS
      DomainValidationOptions:
        - DomainName: !Ref DomainName
          HostedZoneId: !Ref PublicHostedZone
        - DomainName: !Sub www.${DomainName}
          HostedZoneId: !Ref PublicHostedZone
      Tags:
        - Key: Name
          Value: !Sub ${ProjectName}-${EnvironmentName}-ssl

  HttpsLoadBalancerListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Condition: ShouldEnableHttps
    Properties:
      Certificates:
        - CertificateArn: !Ref SslCertificate
      DefaultActions:
        - Type: forward
          TargetGroupArn: !Ref LoadBalancerTargetGroup
      LoadBalancerArn: !Ref PublicLoadBalancer
      Port: 443
      Protocol: HTTPS

  ArtifactBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      VersioningConfiguration:
        Status: Enabled
      Tags:
        - Key: Name
          Value: !Sub ${ProjectName}-${EnvironmentName}-artifacts

  ArtifactBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref ArtifactBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: DenyInsecureTransport
            Effect: Deny
            Principal: '*'
            Action: s3:*
            Resource:
              - !Sub arn:aws:s3:::${ArtifactBucket}
              - !Sub arn:aws:s3:::${ArtifactBucket}/*
            Condition:
              Bool:
                aws:SecureTransport: false

  MediaBucket:
    Type: AWS::S3::Bucket
    Condition: CreateMediaBucket
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      VersioningConfiguration:
        Status: Enabled
      Tags:
        - Key: Name
          Value: !Sub ${ProjectName}-${EnvironmentName}-media

  MediaBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Condition: CreateMediaBucket
    Properties:
      Bucket: !Ref MediaBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: DenyInsecureTransport
            Effect: Deny
            Principal: '*'
            Action: s3:*
            Resource:
              - !Sub arn:aws:s3:::${MediaBucket}
              - !Sub arn:aws:s3:::${MediaBucket}/*
            Condition:
              Bool:
                aws:SecureTransport: false

  AppConfigSecret:
    Type: AWS::SecretsManager::Secret
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      Name: !Sub ${ProjectName}/${EnvironmentName}/app-config
      Description: Application environment values for the single-host retail app
      SecretString:
        Fn::Sub:
          - |
            {
              "PORT":"8080",
              "SPRING_PROFILES_ACTIVE":"prod",
              "DB_INIT_MODE":"never",
              "CORS_ALLOWED_ORIGINS":"${CorsAllowedOrigins}",
              "STAFF_JWT_SECRET":"${StaffJwtSecret}",
              "STAFF_JWT_TTL_MINUTES":"480",
              "CUSTOMER_JWT_SECRET":"${CustomerJwtSecret}",
              "CUSTOMER_JWT_TTL_MINUTES":"43200",
              "OTP_TTL_MINUTES":"5",
              "OTP_RATE_LIMIT_SECONDS":"30",
              "OTP_LENGTH":"6",
              "OTP_MAX_ATTEMPTS":"5",
              "CHECKOUT_TAX_PERCENT":"${CheckoutTaxPercent}",
              "CHECKOUT_DELIVERY_CHARGE":"${CheckoutDeliveryCharge}",
              "CHECKOUT_FREE_DELIVERY_MIN_ORDER":"${CheckoutFreeDeliveryMinOrder}",
              "PAYMENT_PROVIDER":"${PaymentProvider}",
              "RAZORPAY_KEY_ID":"${RazorpayKeyId}",
              "RAZORPAY_KEY_SECRET":"${RazorpayKeySecret}",
              "RAZORPAY_WEBHOOK_SECRET":"${RazorpayWebhookSecret}",
              "META_ACCESS_TOKEN":"${MetaAccessToken}",
              "META_WHATSAPP_PHONE_NUMBER_ID":"${MetaWhatsAppPhoneNumberId}",
              "META_WHATSAPP_OTP_TEMPLATE_NAME":"${MetaWhatsAppOtpTemplateName}",
              "META_WHATSAPP_OTP_TEMPLATE_LANGUAGE":"${MetaWhatsAppOtpTemplateLanguage}",
              "FB_PAGE_ID":"${FacebookPageId}",
              "FB_PAGE_ACCESS_TOKEN":"${FacebookPageAccessToken}",
              "IG_BUSINESS_ACCOUNT_ID":"${InstagramBusinessAccountId}",
              "META_GRAPH_VERSION":"${MetaGraphVersion}",
              "META_APP_ID":"${MetaAppId}",
              "META_APP_SECRET":"${MetaAppSecret}",
              "META_FB_EXCHANGE_TOKEN":"${MetaFbExchangeToken}",
              "META_TOKEN_REFRESH_SECRET_ID":"${ProjectName}/${EnvironmentName}/app-config",
              "META_TOKEN_REFRESH_ENABLED":"true",
              "META_TOKEN_REFRESH_INTERVAL_MS":"3888000000",
              "META_TOKEN_REFRESH_INITIAL_DELAY_MS":"60000",
              "MARKETING_META_ACCESS_TOKEN":"${MetaAccessToken}",
              "MARKETING_FACEBOOK_PAGE_ID":"${FacebookPageId}",
              "MARKETING_FACEBOOK_PAGE_ACCESS_TOKEN":"${FacebookPageAccessToken}",
              "MARKETING_INSTAGRAM_BUSINESS_ACCOUNT_ID":"${InstagramBusinessAccountId}",
              "MARKETING_META_GRAPH_VERSION":"${MetaGraphVersion}",
              "MARKETING_WHATSAPP_PHONE_NUMBER_ID":"${MetaWhatsAppPhoneNumberId}",
              "FB_APP_ID":"${MetaAppId}",
              "FB_APP_SECRET":"${MetaAppSecret}",
              "FB_EXCHANGE_TOKEN":"${MetaFbExchangeToken}",
              "OPEN_AI_API_KEY":"${OpenAiApiKey}",
              "MARKETING_OPENAI_API_KEY":"${OpenAiApiKey}",
              "MARKETING_AI_ENABLED":"true",
              "MARKETING_OPENAI_MODEL":"gpt-4.1-mini",
              "MARKETING_OPENAI_IMAGE_MODEL":"gpt-image-1.5",
              "MARKETING_OPENAI_IMAGE_SIZE":"1024x1024",
              "MARKETING_OPENAI_IMAGE_QUALITY":"medium",
              "GOOGLE_CLIENT_ID":"${GoogleClientId}",
              "GOOGLE_CLIENT_SECRET":"${GoogleClientSecret}",
              "GOOGLE_OAUTH_CLIENT_SECRET":"${GoogleClientSecret}",
              "GOOGLE_REDIRECT_URI":"${GoogleOAuthRedirectUri}",
              "GOOGLE_OAUTH_REDIRECT_URI":"${GoogleOAuthRedirectUri}",
              "GOOGLE_MAPS_API_KEY":"${GoogleMapsApiKey}",
              "OMNICHANNEL_WEBSITE_BASE_URL":"${ResolvedWebsiteBaseUrl}",
              "OMNICHANNEL_WEBHOOK_VERIFY_TOKEN":"",
              "OMNICHANNEL_WEBHOOK_SECRET":"",
              "OMNICHANNEL_DEFAULT_COUPON_CODE":"",
              "OMNICHANNEL_MAX_PRODUCT_CARDS":"6",
              "AWS_REGION":"${AWS::Region}",
              "AWS_S3_BUCKET":"${ResolvedAwsS3Bucket}",
              "AWS_CLOUDFRONT_DOMAIN":"${ResolvedImageBaseUrl}",
              "UPLOAD_MAX_BYTES":"5242880",
              "UPLOAD_MAX_FILE_SIZE":"8MB",
              "UPLOAD_MAX_REQUEST_SIZE":"10MB",
              "MIGRATE_IMAGES_TO_S3_ON_START":"false",
              "APP_REDIS_ENABLED":"false",
              "APP_REDIS_OTP_KEY_PREFIX":"retail:otp:",
              "APP_REDIS_CART_KEY_PREFIX":"retail:cart:",
              "APP_REDIS_CART_TTL_MINUTES":"30"
            }
          - ResolvedAwsS3Bucket: !If [HasAwsS3Bucket, !Ref AwsS3Bucket, !Ref MediaBucket]
            ResolvedImageBaseUrl: !If
              - HasAwsCloudFrontDomain
              - !Ref AwsCloudFrontDomain
              - !If
                - HasDomainName
                - !Sub https://${DomainName}/api/images
                - !Sub http://${PublicLoadBalancer.DNSName}/api/images
            ResolvedWebsiteBaseUrl: !If
              - HasDomainName
              - !Sub https://${DomainName}
              - !Sub http://${PublicLoadBalancer.DNSName}

  DatabaseSecret:
    Type: AWS::SecretsManager::Secret
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      Name: !Sub ${ProjectName}/${EnvironmentName}/postgres
      Description: Local postgres credentials for the single-host retail app
      GenerateSecretString:
        SecretStringTemplate: !Sub '{"POSTGRES_DB":"${PostgresDatabaseName}","POSTGRES_USER":"${PostgresDatabaseUser}"}'
        GenerateStringKey: POSTGRES_PASSWORD
        ExcludePunctuation: true
        IncludeSpace: false
        PasswordLength: 24

  GitHubOidcProvider:
    Type: AWS::IAM::OIDCProvider
    Condition: CreateGitHubOidcProvider
    Properties:
      Url: https://token.actions.githubusercontent.com
      ClientIdList:
        - sts.amazonaws.com
      ThumbprintList:
        - !Ref GitHubOidcThumbprint

  Ec2InstanceRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub ${ProjectName}-${EnvironmentName}-ec2-role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
      Policies:
        - PolicyName: !Sub ${ProjectName}-${EnvironmentName}-instance-access
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:ListBucket
                Resource:
                  - !Sub arn:aws:s3:::${ArtifactBucket}
                  - !Sub arn:aws:s3:::${ArtifactBucket}/*
              - Effect: Allow
                Action:
                  - secretsmanager:GetSecretValue
                  - secretsmanager:DescribeSecret
                  - secretsmanager:UpdateSecret
                Resource:
                  - !Ref AppConfigSecret
                  - !Ref DatabaseSecret
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                Resource: !If
                  - HasAwsS3Bucket
                  - !Sub arn:aws:s3:::${AwsS3Bucket}/*
                  - !Sub arn:aws:s3:::${MediaBucket}/*
              - Effect: Allow
                Action:
                  - s3:ListBucket
                Resource: !If
                  - HasAwsS3Bucket
                  - !Sub arn:aws:s3:::${AwsS3Bucket}
                  - !Sub arn:aws:s3:::${MediaBucket}

  Ec2InstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles:
        - !Ref Ec2InstanceRole

  GitHubDeployRole:
    Type: AWS::IAM::Role
    Condition: EnableGitHubDeploy
    Properties:
      RoleName: !Sub ${ProjectName}-${EnvironmentName}-github-deploy-role
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Federated: !If
                - HasExistingGitHubOidcProvider
                - !Ref ExistingGitHubOidcProviderArn
                - !Ref GitHubOidcProvider
            Action: sts:AssumeRoleWithWebIdentity
            Condition:
              StringEquals:
                token.actions.githubusercontent.com:aud: sts.amazonaws.com
              StringLike:
                token.actions.githubusercontent.com:sub: !Sub repo:${GitHubOwner}/${GitHubRepo}:ref:refs/heads/${GitHubBranch}
      Policies:
        - PolicyName: !Sub ${ProjectName}-${EnvironmentName}-github-deploy
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - cloudformation:DescribeStacks
                Resource: !Sub arn:aws:cloudformation:${AWS::Region}:${AWS::AccountId}:stack/${AWS::StackName}/*
              - Effect: Allow
                Action:
                  - s3:PutObject
                  - s3:GetObject
                  - s3:ListBucket
                Resource:
                  - !Sub arn:aws:s3:::${ArtifactBucket}
                  - !Sub arn:aws:s3:::${ArtifactBucket}/*
              - Effect: Allow
                Action:
                  - ssm:SendCommand
                Resource:
                  - !Sub arn:aws:ec2:${AWS::Region}:${AWS::AccountId}:instance/${RetailEc2Instance}
                  - !Sub arn:aws:ssm:${AWS::Region}::document/AWS-RunShellScript
              - Effect: Allow
                Action:
                  - ssm:GetCommandInvocation
                  - ssm:ListCommandInvocations
                  - ssm:ListCommands
                Resource: '*'
              - Effect: Allow
                Action:
                  - ec2:DescribeInstances
                Resource: '*'

  RetailEc2Instance:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: !Ref AmiId
      InstanceType: !Ref InstanceType
      IamInstanceProfile: !Ref Ec2InstanceProfile
      KeyName: !If [HasKeyPair, !Ref KeyPairName, !Ref AWS::NoValue]
      Monitoring: true
      DisableApiTermination: true
      SubnetId: !Ref PublicSubnet
      SecurityGroupIds:
        - !Ref AppSecurityGroup
      BlockDeviceMappings:
        - DeviceName: /dev/xvda
          Ebs:
            DeleteOnTermination: true
            Encrypted: true
            VolumeType: gp3
            VolumeSize: !Ref RootVolumeSize
      MetadataOptions:
        HttpEndpoint: enabled
        HttpTokens: required
      Tags:
        - Key: Name
          Value: !Sub ${ProjectName}-${EnvironmentName}-ec2
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash
          set -euxo pipefail

          dnf update -y
          dnf install -y docker jq git tar gzip
          systemctl enable --now docker
          usermod -aG docker ec2-user || true

          DATA_DEVICE=""
          if [ -b /dev/nvme1n1 ]; then
            DATA_DEVICE=/dev/nvme1n1
          elif [ -b /dev/xvdf ]; then
            DATA_DEVICE=/dev/xvdf
          elif [ -b /dev/xvdb ]; then
            DATA_DEVICE=/dev/xvdb
          fi

          mkdir -p /mnt/retail-data
          if [ -n "$DATA_DEVICE" ]; then
            if ! blkid "$DATA_DEVICE" >/dev/null 2>&1; then
              mkfs -t ext4 "$DATA_DEVICE"
            fi

            UUID=$(blkid -s UUID -o value "$DATA_DEVICE")
            grep -q "$UUID" /etc/fstab || echo "UUID=$UUID /mnt/retail-data ext4 defaults,nofail 0 2" >> /etc/fstab
            mount -a
          fi

          mkdir -p /mnt/retail-data/postgres /mnt/retail-data/backups /opt/retail-shop/releases /opt/retail-shop/bin
          chown -R 999:999 /mnt/retail-data/postgres
          docker network inspect retail-shop-net >/dev/null 2>&1 || docker network create retail-shop-net

  DataVolume:
    Type: AWS::EC2::Volume
    DeletionPolicy: Retain
    UpdateReplacePolicy: Retain
    Properties:
      AvailabilityZone: !GetAtt RetailEc2Instance.AvailabilityZone
      Encrypted: true
      Size: !Ref DataVolumeSize
      VolumeType: gp3
      Tags:
        - Key: Name
          Value: !Sub ${ProjectName}-${EnvironmentName}-data

  DataVolumeAttachment:
    Type: AWS::EC2::VolumeAttachment
    Properties:
      Device: /dev/xvdf
      InstanceId: !Ref RetailEc2Instance
      VolumeId: !Ref DataVolume

  ElasticIp:
    Type: AWS::EC2::EIP
    Properties:
      Domain: vpc
      Tags:
        - Key: Name
          Value: !Sub ${ProjectName}-${EnvironmentName}-eip

  ElasticIpAssociation:
    Type: AWS::EC2::EIPAssociation
    Properties:
      AllocationId: !GetAtt ElasticIp.AllocationId
      InstanceId: !Ref RetailEc2Instance

  PublicHostedZone:
    Type: AWS::Route53::HostedZone
    Condition: ShouldCreateHostedZone
    Properties:
      Name: !Ref DomainName
      HostedZoneConfig:
        Comment: !Sub Public hosted zone for ${DomainName}

  ApexAliasRecord:
    Type: AWS::Route53::RecordSet
    Condition: ShouldCreateHostedZone
    Properties:
      HostedZoneId: !Ref PublicHostedZone
      Name: !Ref DomainName
      Type: A
      AliasTarget:
        DNSName: !GetAtt PublicLoadBalancer.DNSName
        HostedZoneId: !GetAtt PublicLoadBalancer.CanonicalHostedZoneID

  WwwAliasRecord:
    Type: AWS::Route53::RecordSet
    Condition: ShouldCreateHostedZone
    Properties:
      HostedZoneId: !Ref PublicHostedZone
      Name: !Sub www.${DomainName}
      Type: A
      AliasTarget:
        DNSName: !GetAtt PublicLoadBalancer.DNSName
        HostedZoneId: !GetAtt PublicLoadBalancer.CanonicalHostedZoneID

Outputs:
  StackName:
    Value: !Ref AWS::StackName
  Region:
    Value: !Ref AWS::Region
  InstanceId:
    Value: !Ref RetailEc2Instance
  InstancePublicIp:
    Value: !Ref ElasticIp
  InstancePublicDns:
    Value: !GetAtt RetailEc2Instance.PublicDnsName
  ArtifactBucketName:
    Value: !Ref ArtifactBucket
  AppConfigSecretArn:
    Value: !Ref AppConfigSecret
  DatabaseSecretArn:
    Value: !Ref DatabaseSecret
  GitHubDeployRoleArn:
    Condition: EnableGitHubDeploy
    Value: !GetAtt GitHubDeployRole.Arn
  VpcId:
    Value: !Ref RetailVpc
  PublicSubnetId:
    Value: !Ref PublicSubnet
  SecondPublicSubnetId:
    Value: !Ref SecondPublicSubnet
  LoadBalancerDnsName:
    Value: !GetAtt PublicLoadBalancer.DNSName
  LoadBalancerHostedZoneId:
    Value: !GetAtt PublicLoadBalancer.CanonicalHostedZoneID
  LoadBalancerUrl:
    Value: !If
      - ShouldEnableHttps
      - !Sub https://${DomainName}
      - !Sub http://${PublicLoadBalancer.DNSName}
  MediaBucketName:
    Value: !If [HasAwsS3Bucket, !Ref AwsS3Bucket, !Ref MediaBucket]
  ImageBaseUrl:
    Value: !If
      - HasAwsCloudFrontDomain
      - !Ref AwsCloudFrontDomain
      - !If
        - HasDomainName
        - !Sub https://${DomainName}/api/images
        - !Sub http://${PublicLoadBalancer.DNSName}/api/images
  HostedZoneId:
    Condition: ShouldCreateHostedZone
    Value: !Ref PublicHostedZone
  HostedZoneNameServers:
    Condition: ShouldCreateHostedZone
    Value: !Join [',', !GetAtt PublicHostedZone.NameServers]
  ApexDomainName:
    Condition: ShouldCreateHostedZone
    Value: !Ref DomainName
  WwwDomainName:
    Condition: ShouldCreateHostedZone
    Value: !Sub www.${DomainName}
